
services:
  rabbitmq:
    container_name: rabbitmq
    image: rabbitmq:latest
    networks:
      - main
    ports:
      - 5672:5672
    restart: always

  postgres:
    container_name: postgres
    image: postgres:latest
    environment:
      - POSTGRES_DB=postgres
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    networks:
      - main
    ports:
      - 5432:5432
    restart: always
    volumes:
      - postgres_data: var/lib/postgresql/data

  celery_worker:
    container_name: celery_worker
    command: "celery -A A worker INFO"
    depends_on:
      - app
      - rabbitmq
      - postgres
    image: app-image
    environment:
      - C_FORCE_ROOT="true"
    networks:
      - main
    restart: always

  app:
    build: .
    command: sh -c "python manage.py migrate && python manage.py runserver"
    container_name: app
    volumes:
      - .:/code/
    depends_on:
      - postgres
      - rabbitmq
    expose:
      - 8000
    networks:
      - main
    restart: always

networks:
  main:

volumes:
  postgres_data: