{% extends 'base.html' %}
{% load extra_tags %}

{% block content %}
    <h2>{{product.name}}</h2>
    <small>{{product.created|timesince_fa}}</small>
    <p>{{product.price|divide_thousand }}هزار تومان </p>
    <img src="{{product.image.url}}" style="width: 30rem;">
    <p>{{product.description|safe}}</p><br/><br/>

    
    <form action="{% url 'orders:cart_add' product.id %}" method="post">
        {% csrf_token %}
        {{ form }}
        <br>
        <input type="submit" value="add to cart" style="background-color: chartreuse;">
    </form>
{% endblock %}
